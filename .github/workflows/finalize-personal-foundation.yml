name: Finalize personal foundation status

on:
  push:
    branches:
      - build-personal-mvp-foundation
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Update execution plan
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('docs/EXECUTION-PLAN.md')
          text = path.read_text()
          replacements = {
            '- **Current stage:** P1 — Personal MVP specification and foundation': '- **Current stage:** P2 — Local application shell',
            '- **Current milestone:** Finalize the personal domain model, application architecture and first vertical slice': '- **Current milestone:** Install dependencies, launch the Expo shell and connect the first SQLite-backed vertical slice',
            '- **Application status:** Personal-first direction fixed; application source code not started': '- **Application status:** Expo shell, domain rules and SQLite schema added; dependency installation and runtime launch remain',
            '- [ ] P1 — Personal MVP specification and foundation': '- [x] ~~P1 — Personal MVP specification and foundation~~ — Evidence: `docs/technical/PERSONAL-MVP-ARCHITECTURE.md`, application domain, migration and tests.',
            '- [ ] Confirm the initial navigation: Today, Skill Tree, Progress, Weekly Review and Settings.': '- [x] ~~Confirm the initial navigation: Today, Skill Tree, Progress, Weekly Review and Settings.~~ — Evidence: accepted architecture and five Expo Router tabs.',
            '- [ ] Define the exact progress model: activity, XP, demonstrated skill, consistency and repetition health.': '- [x] ~~Define the exact progress model: activity, XP, demonstrated skill, consistency and repetition health.~~ — Evidence: architecture document and `apps/mobile/src/domain/progress.ts`.',
            '- [ ] Define skill levels and the rules for moving between L3, L2, L1 and L0.': '- [x] ~~Define skill levels and the rules for moving between L3, L2, L1 and L0.~~ — Evidence: support-level contract in the architecture document.',
            '- [ ] Define the relationship between goals, skills, quests and evidence.': '- [x] ~~Define the relationship between goals, skills, quests and evidence.~~ — Evidence: domain relationship map and SQLite foreign keys.',
            '- [ ] Define Markdown frontmatter and stable IDs for import/export.': '- [x] ~~Define Markdown frontmatter and stable IDs for import/export.~~ — Evidence: Markdown contract in the architecture document.',
            '- [ ] Decide which attachment types are supported in the personal alpha.': '- [x] ~~Decide which attachment types are supported in the personal alpha.~~ — Evidence: text notes, HTTPS links and external note paths; binary copying deferred.',
            '- [ ] Produce the SQLite schema and migrations.': '- [x] ~~Produce the SQLite schema and migrations.~~ — Evidence: `apps/mobile/src/storage/migrations.ts`.',
            '- [ ] Define local backup and restore behavior.': '- [x] ~~Define local backup and restore behavior.~~ — Evidence: versioned JSON snapshot plus Markdown export contract.',
            '- [ ] Define acceptance criteria for the first vertical slice.': '- [x] ~~Define acceptance criteria for the first vertical slice.~~ — Evidence: architecture document.',
            '- [ ] Create the app workspace and engineering conventions.': '- [x] ~~Create the app workspace and engineering conventions.~~ — Evidence: `apps/mobile/`, strict TypeScript, domain/storage separation and test scripts.',
            '- [ ] Create `apps/mobile/` with Expo, React Native and TypeScript.': '- [x] ~~Create `apps/mobile/` with Expo, React Native and TypeScript.~~ — Evidence: package and application configuration.',
            '- [ ] Configure Expo Router.': '- [x] ~~Configure Expo Router.~~ — Evidence: root redirect and five-tab route shell.',
            '- [ ] Configure SQLite and migrations.': '- [x] ~~Configure SQLite and migrations.~~ — Evidence: migration runner and initial schema.',
            '- [ ] Add domain and validation layers separated from UI.': '- [x] ~~Add domain and validation layers separated from UI.~~ — Evidence: pure TypeScript types and progress rules.',
            '- [ ] Add light/dark design tokens based on the Levera brand.': '- [ ] Add light/dark design tokens based on the Levera brand.\n  Progress: light Levera tokens and five visual shell screens added; dark theme remains.',
            '- [ ] Add type checking, linting and automated tests.': '- [ ] Add type checking, linting and automated tests.\n  Progress: scripts added and 4 pure domain tests pass locally; dependency install, full typecheck and lint remain.',
            '- [ ] Add local development and build instructions.': '- [x] ~~Add local development and build instructions.~~ — Evidence: `apps/mobile/README.md`.'
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing execution-plan text: {old}')
              text = text.replace(old, new)

          marker = '## Changelog\n'
          entry = '''## Changelog

### 2026-07-15 — Personal MVP foundation

- Completed P1 architecture and domain decisions.
- Added the Expo Router shell with Today, Skills, Progress, Review and Connections screens.
- Added a local-first SQLite schema and migration runner.
- Added pure domain completion and skill-health rules; 4 tests pass.
- Completed visual QA of the Today-screen direction with no overflow or overlap.
- Advanced the active stage to P2; dependency installation and runtime launch remain.
'''
          if marker not in text:
              raise SystemExit('Missing changelog marker')
          text = text.replace(marker, entry, 1)
          path.write_text(text)
          PY

          rm -f .github/workflows/finalize-personal-foundation.yml
          find .github -type d -empty -delete 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update Personal MVP execution status"
          git push
