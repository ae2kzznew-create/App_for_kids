name: Mobile CI

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile-ci.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Typecheck
        id: typecheck
        run: npm run typecheck > typecheck.log 2>&1
      - name: Test domain rules
        id: tests
        run: npm test > test.log 2>&1
      - name: Bundle Android application
        id: bundle
        run: npx expo export --platform android --output-dir dist/android > bundle.log 2>&1
      - name: Report validation failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "### Mobile CI failure"
            echo
            for log in typecheck.log test.log bundle.log; do
              if [ -f "$log" ]; then
                echo "#### $log"
                echo '```text'
                tail -n 120 "$log"
                echo '```'
              fi
            done
          } > validation-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file validation-comment.md
