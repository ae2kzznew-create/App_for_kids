name: Group documentation under docs

on:
  push:
    branches:
      - move-docs-under-docs
  workflow_dispatch:

permissions:
  contents: write

jobs:
  organize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Move documentation under docs
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p docs apps

          for dir in archive brand business legal marketing product research technical validation; do
            if [[ -d "$dir" ]]; then
              git mv "$dir" docs/
            fi
          done

          cat > README.md <<'EOF'
          # Levera

          Levera is a family product concept for helping children aged 8–12 build practical skills through calibrated quests, visible progress, and parent participation.

          ## Repository layout

          - [`apps/`](apps/) — application source code will live here.
          - [`docs/`](docs/) — product, research, validation, technical, brand, marketing, business and legal documents.

          ## Documentation: start here

          1. [`docs/product/Product-Bible.html`](docs/product/Product-Bible.html) — canonical product vision and principles.
          2. [`docs/research/README.md`](docs/research/README.md) — research index and evidence map.
          3. [`docs/validation/Mom-Test-Interview-Script.html`](docs/validation/Mom-Test-Interview-Script.html) — problem interviews.
          4. [`docs/validation/Wizard-of-Oz-Guide.html`](docs/validation/Wizard-of-Oz-Guide.html) — manual MVP test.
          5. [`docs/validation/W4-Retention-Test-Protocol.html`](docs/validation/W4-Retention-Test-Protocol.html) — go/no-go metrics.
          6. [`docs/technical/MVP-Technical-Brief.html`](docs/technical/MVP-Technical-Brief.html) — initial implementation brief.

          ## Current status

          The repository currently contains project documentation. Application source code has not yet been added.

          The first product to build is a mobile application with one shared family account and separate parent and child experiences.
          EOF

          cat > docs/README.md <<'EOF'
          # Levera documentation

          All project documentation is grouped here so the repository root remains available for application code and infrastructure.

          ## Sections

          - `product/` — canonical product definition, roadmap, UX and onboarding.
          - `research/` — competitors, market evidence, audience and raw exports.
          - `validation/` — interview and experiment protocols.
          - `technical/` — technical specifications.
          - `brand/` — brand identity.
          - `marketing/` — acquisition, content, store and PR materials.
          - `business/` — business model, pricing, partnerships and fundraising.
          - `legal/` — legal drafts requiring professional review.
          - `archive/` — superseded or incomplete materials.

          ## Canonical documents

          - Product source of truth: `product/Product-Bible.html`
          - Research entry point: `research/README.md`
          - MVP implementation brief: `technical/MVP-Technical-Brief.html`
          - Validation sequence: `validation/Mom-Test-Interview-Script.html` → `validation/Wizard-of-Oz-Guide.html` → `validation/W4-Retention-Test-Protocol.html`
          EOF

          cat > apps/README.md <<'EOF'
          # Applications

          Application source code will be created in this directory.

          Planned structure:

          ```text
          apps/
            mobile/   React Native / Expo application for parents and children
            admin/    Internal operations panel for quests, families and reports
          ```

          The initial implementation should follow `../docs/technical/MVP-Technical-Brief.html`, after resolving the architecture and privacy issues recorded during review.
          EOF

          rm -f .github/workflows/move-docs-under-docs.yml
          find .github -type d -empty -delete 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Group project documentation under docs"
          git push
