name: Release builds

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "apps/web/**"
      - "apps/desktop/**"
      - ".github/workflows/release-build.yml"

permissions:
  contents: write

concurrency:
  group: release-builds
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Use Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install dependencies
        working-directory: apps/mobile
        run: npm install --no-audit --no-fund
      - name: Stamp Android versionCode from the CI run number
        working-directory: apps/mobile
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          node -e "
            const fs = require('fs');
            const file = './app.json';
            const config = JSON.parse(fs.readFileSync(file, 'utf8'));
            config.expo.android = config.expo.android || {};
            config.expo.android.versionCode = Number(process.env.RUN_NUMBER);
            fs.writeFileSync(file, JSON.stringify(config, null, 2) + '\n');
          "
      - name: Generate native Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android
      - name: Build installable APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk dist/Levera.apk
          mkdir -p dist/Levera-Web
          cp apps/web/index.html dist/Levera-Web/
          cp apps/web/levera-*.js dist/Levera-Web/
          cp apps/web/README.md dist/Levera-Web/README.md
          printf 'start "" "%%~dp0index.html"\r\n' > dist/Levera-Web/start-levera.bat
          cd dist && zip -r Levera-Web.zip Levera-Web
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-and-web
          path: |
            dist/Levera.apk
            dist/Levera-Web.zip

  windows-desktop:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Copy shared UI into the desktop shell
        shell: bash
        run: |
          mkdir -p apps/desktop/app
          cp apps/web/index.html apps/desktop/app/index.html
          cp apps/web/levera-*.js apps/desktop/app/
      - name: Install dependencies
        working-directory: apps/desktop
        run: npm install --no-audit --no-fund
      - name: Build portable Windows executable
        working-directory: apps/desktop
        run: npx electron-builder --win portable --publish never
      - name: Package unpacked Windows build as a ZIP (fewer antivirus false positives)
        working-directory: apps/desktop
        shell: pwsh
        run: |
          Rename-Item -Path dist/win-unpacked -NewName Levera
          Compress-Archive -Path dist/Levera -DestinationPath dist/Levera-Windows.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop
          path: |
            apps/desktop/dist/Levera.exe
            apps/desktop/dist/Levera-Windows.zip

  publish:
    runs-on: ubuntu-latest
    needs: [android, windows-desktop]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Publish versioned release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v0.1.0-build.${{ github.run_number }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/Levera.apk dist/Levera.exe dist/Levera-Windows.zip dist/Levera-Web.zip --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" dist/Levera.apk dist/Levera.exe dist/Levera-Windows.zip dist/Levera-Web.zip \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Levera $TAG" \
              --notes "Автоматическая сборка $TAG из коммита ${GITHUB_SHA:0:7}. Файлы идентичны релизу latest на момент публикации."
          fi
      - name: Update "latest" release in place
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="Levera.apk — установка на Android напрямую. Levera-Windows.zip — приложение для Windows: распакуй папку и запусти Levera.exe внутри (антивирусы реагируют на этот формат реже всего). Levera.exe — тот же вариант одним файлом. Levera-Web.zip — запасной браузерный вариант. Текущая сборка: v0.1.0-build.${{ github.run_number }} (${GITHUB_SHA:0:7})."
          if gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload latest dist/Levera.apk dist/Levera.exe dist/Levera-Windows.zip dist/Levera-Web.zip --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit latest --repo "$GITHUB_REPOSITORY" --title "Levera — свежие сборки" --notes "$NOTES"
          else
            gh release create latest dist/Levera.apk dist/Levera.exe dist/Levera-Windows.zip dist/Levera-Web.zip \
              --repo "$GITHUB_REPOSITORY" \
              --title "Levera — свежие сборки" \
              --notes "$NOTES"
          fi
